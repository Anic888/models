<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="models — stock market financial models organized by ticker">
  <defs>
    <linearGradient id="finBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1228"/>
      <stop offset="100%" stop-color="#0c1e3a"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="accentFin" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="50%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <pattern id="finGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#60a5fa" stroke-width="0.4" stroke-opacity="0.08"/>
    </pattern>
  </defs>

  <rect width="1200" height="320" fill="url(#finBg)"/>
  <rect width="1200" height="320" fill="url(#finGrid)"/>
  <rect y="316" width="1200" height="4" fill="url(#accentFin)"/>

  <!-- Candlestick chart (left) -->
  <g transform="translate(80,90)" stroke-width="1">
    <!-- horizontal price levels -->
    <g stroke="#1e3a8a" stroke-opacity="0.5">
      <line x1="0" y1="0" x2="380" y2="0"/>
      <line x1="0" y1="40" x2="380" y2="40"/>
      <line x1="0" y1="80" x2="380" y2="80"/>
      <line x1="0" y1="120" x2="380" y2="120"/>
      <line x1="0" y1="160" x2="380" y2="160"/>
    </g>

    <!-- Candles — mix of up (green) and down (red) -->
    <!-- C1 -->
    <line x1="14" y1="40" x2="14" y2="120" stroke="#10b981" stroke-width="1.5"/>
    <rect x="8" y="60" width="12" height="40" fill="#10b981"/>
    <!-- C2 -->
    <line x1="38" y1="50" x2="38" y2="135" stroke="#10b981" stroke-width="1.5"/>
    <rect x="32" y="55" width="12" height="60" fill="#10b981"/>
    <!-- C3 (down) -->
    <line x1="62" y1="32" x2="62" y2="105" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="56" y="42" width="12" height="50" fill="#ef4444"/>
    <!-- C4 -->
    <line x1="86" y1="48" x2="86" y2="90" stroke="#10b981" stroke-width="1.5"/>
    <rect x="80" y="60" width="12" height="22" fill="#10b981"/>
    <!-- C5 -->
    <line x1="110" y1="38" x2="110" y2="98" stroke="#10b981" stroke-width="1.5"/>
    <rect x="104" y="50" width="12" height="38" fill="#10b981"/>
    <!-- C6 (down) -->
    <line x1="134" y1="50" x2="134" y2="115" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="128" y="62" width="12" height="40" fill="#ef4444"/>
    <!-- C7 -->
    <line x1="158" y1="42" x2="158" y2="92" stroke="#10b981" stroke-width="1.5"/>
    <rect x="152" y="50" width="12" height="32" fill="#10b981"/>
    <!-- C8 -->
    <line x1="182" y1="30" x2="182" y2="82" stroke="#10b981" stroke-width="1.5"/>
    <rect x="176" y="38" width="12" height="36" fill="#10b981"/>
    <!-- C9 (down) -->
    <line x1="206" y1="18" x2="206" y2="68" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="200" y="28" width="12" height="30" fill="#ef4444"/>
    <!-- C10 -->
    <line x1="230" y1="14" x2="230" y2="62" stroke="#10b981" stroke-width="1.5"/>
    <rect x="224" y="22" width="12" height="30" fill="#10b981"/>
    <!-- C11 -->
    <line x1="254" y1="6" x2="254" y2="56" stroke="#10b981" stroke-width="1.5"/>
    <rect x="248" y="14" width="12" height="30" fill="#10b981"/>
    <!-- C12 -->
    <line x1="278" y1="2" x2="278" y2="42" stroke="#10b981" stroke-width="1.5"/>
    <rect x="272" y="10" width="12" height="22" fill="#10b981"/>
    <!-- C13 (down) -->
    <line x1="302" y1="-2" x2="302" y2="38" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="296" y="4" width="12" height="24" fill="#ef4444"/>
    <!-- C14 -->
    <line x1="326" y1="-6" x2="326" y2="28" stroke="#10b981" stroke-width="1.5"/>
    <rect x="320" y="-2" width="12" height="20" fill="#10b981"/>
    <!-- C15 -->
    <line x1="350" y1="-14" x2="350" y2="18" stroke="#10b981" stroke-width="1.5"/>
    <rect x="344" y="-10" width="12" height="22" fill="#10b981"/>

    <!-- Trend line -->
    <path d="M 14 80 L 350 0" stroke="url(#goldGrad)" stroke-width="2" fill="none" stroke-dasharray="4,3" opacity="0.85"/>

    <!-- Tickers along bottom -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="#94a3b8">
      <text x="14" y="180">005930</text>
      <text x="86" y="180">ABBV</text>
      <text x="158" y="180">2196</text>
      <text x="230" y="180">4502</text>
      <text x="302" y="180">AZN</text>
    </g>
  </g>

  <!-- Typography (right) -->
  <g transform="translate(550,108)" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
    <text x="0" y="0" font-size="56" font-weight="800" fill="#ffffff" letter-spacing="-1.5">models</text>
    <text x="0" y="32" font-size="16" font-weight="500" fill="#fbbf24">stock market models, by ticker</text>
    <text x="0" y="54" font-size="13" fill="#94a3b8">healthcare · biopharma · tech · industrials · diseases · screens</text>

    <!-- Region pills -->
    <g transform="translate(0,80)" font-family="ui-monospace, Menlo, monospace" font-size="11" font-weight="700">
      <g>
        <rect width="56" height="24" rx="12" fill="#1e3a8a"/>
        <text x="28" y="16" text-anchor="middle" fill="#bfdbfe">US</text>
      </g>
      <g transform="translate(64,0)">
        <rect width="56" height="24" rx="12" fill="#7f1d1d"/>
        <text x="28" y="16" text-anchor="middle" fill="#fecaca">JP</text>
      </g>
      <g transform="translate(128,0)">
        <rect width="56" height="24" rx="12" fill="#7c2d12"/>
        <text x="28" y="16" text-anchor="middle" fill="#fed7aa">HK</text>
      </g>
      <g transform="translate(192,0)">
        <rect width="56" height="24" rx="12" fill="#064e3b"/>
        <text x="28" y="16" text-anchor="middle" fill="#bbf7d0">KR</text>
      </g>
      <g transform="translate(256,0)">
        <rect width="80" height="24" rx="12" fill="#92400e"/>
        <text x="40" y="16" text-anchor="middle" fill="#fef3c7">Excel + PDF</text>
      </g>
    </g>
  </g>
</svg>
